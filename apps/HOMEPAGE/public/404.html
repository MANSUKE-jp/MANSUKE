<!DOCTYPE html>
<html lang="ja" class="no-js">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANSUKE | 404 NOT FOUND</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+JP:wght@400;700;900&family=Oswald:wght@300;500;700&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
  <!-- Three.js for 3D Hologram -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
            display: ['Oswald', 'sans-serif'],
            mono: ['Monaco', 'Courier New', 'monospace'],
          },
          colors: {
            gold: '#d5b263',
            neon: '#ccff00',
            dark: '#050505',
            'dark-acc': '#111111'
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --cursor-size: 8px;
      --cursor-hover-size: 40px;
    }

    body {
      background-color: #050505;
      color: #ffffff;
      cursor: none;
      overflow: hidden;
      font-feature-settings: "palt";
    }

    /* Noise Overlay - Subtle Grain */
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Custom Cursor */
    .custom-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--cursor-size);
      height: var(--cursor-size);
      background-color: #d5b263;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s cubic-bezier(0.19, 1, 0.22, 1),
        height 0.3s cubic-bezier(0.19, 1, 0.22, 1),
        background-color 0.3s ease,
        opacity 0.3s ease;
      mix-blend-mode: exclusion;
    }

    .custom-cursor.hovered {
      width: var(--cursor-hover-size);
      height: var(--cursor-hover-size);
      background-color: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.5);
      mix-blend-mode: normal;
    }

    /* WebGL Canvas Container */
    #webgl-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0;
      transition: opacity 2s ease;
    }

    /* Typography Utilities */
    .text-glow {
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }
  </style>
</head>

<body class="bg-dark text-white antialiased overflow-hidden">

  <!-- Grainy Noise Overlay -->
  <div class="noise-overlay"></div>

  <!-- Custom Cursor -->
  <div class="custom-cursor" id="cursor"></div>

  <!-- 3D Background (Hologram) -->
  <div id="webgl-container"></div>

  <!-- Header -->
  <header
    class="fixed top-0 left-0 w-full p-6 md:p-10 z-[60] flex justify-between items-start pointer-events-none mix-blend-difference">
    <a href="https://mansuke.jp" class="pointer-events-auto hover-trigger block group">
      <span
        class="text-xl md:text-2xl font-bold font-display tracking-tighter text-white group-hover:text-gold transition-colors duration-300">MANSUKE</span>
      <span class="text-[10px] tracking-[0.2em] uppercase opacity-70 block mt-1 text-white">System Status</span>
    </a>
  </header>

  <!-- Main Content -->
  <main class="relative z-10 w-full h-screen flex flex-col justify-center items-center pointer-events-none">

    <div class="container mx-auto px-6 flex flex-col items-center justify-center relative">

      <!-- Minimalist 404 Text -->
      <div class="relative z-10 text-center mix-blend-screen">
        <h1
          class="text-6xl md:text-9xl font-display font-light tracking-[0.1em] text-white/90 animate-slide-up opacity-0">
          404
        </h1>
        <p class="mt-4 text-xs md:text-sm font-mono tracking-[0.3em] text-gold/80 uppercase animate-slide-up opacity-0"
          style="animation-delay: 0.1s;">
          Page Not Found
        </p>
      </div>

      <!-- Main Message -->
      <div class="mt-12 md:mt-16 text-center max-w-lg pointer-events-auto">
        <p
          class="text-gray-400 text-xs md:text-sm leading-8 font-sans tracking-widest opacity-0 animate-fade-in translate-y-4 font-light">
          検索したページはURLが間違っているか、<br class="hidden md:block">
          すでに削除されています。<br>
          <span class="text-white/60">URLを再度ご確認ください。</span>
        </p>

        <!-- Back Button -->
        <div class="pt-10 opacity-0 animate-fade-in translate-y-4 flex justify-center" style="animation-delay: 0.3s;">
          <a href="https://mansuke.jp"
            class="hover-trigger group relative inline-flex items-center justify-center px-10 py-3 overflow-hidden transition-all duration-500">
            <!-- Border lines -->
            <span
              class="absolute top-0 left-0 w-full h-[1px] bg-white/20 transform scale-x-0 group-hover:scale-x-100 transition-transform duration-500 ease-out origin-center"></span>
            <span
              class="absolute bottom-0 left-0 w-full h-[1px] bg-white/20 transform scale-x-0 group-hover:scale-x-100 transition-transform duration-500 ease-out origin-center"></span>

            <span
              class="relative flex items-center gap-3 font-display font-medium tracking-[0.2em] text-xs uppercase text-gray-300 group-hover:text-gold transition-colors duration-300">
              Back to Home
            </span>
          </a>
        </div>
      </div>

    </div>

    <!-- Footer Decoration -->
    <div
      class="absolute bottom-10 w-full px-10 flex justify-between items-end text-[9px] font-mono text-gray-600 tracking-widest uppercase pointer-events-none">
      <div class="flex flex-col gap-1">
        <span>ERR_CODE: 404</span>
        <span class="flex items-center gap-2">
          STATUS: <span class="w-1 h-1 rounded-full bg-red-500 animate-pulse"></span> DISCONNECTED
        </span>
      </div>
      <div class="text-right opacity-50">
        <span>MANSUKE WSP...</span>
      </div>
    </div>

  </main>

  <script src="js/securityWarning.js"></script>
  <script>
    // --- 1. UI & ANIMATION SETUP ---

    lucide.createIcons();

    // Custom Cursor
    const cursor = document.getElementById('cursor');
    const hoverTriggers = document.querySelectorAll('.hover-trigger');

    document.addEventListener('mousemove', (e) => {
      gsap.to(cursor, {
        x: e.clientX,
        y: e.clientY,
        duration: 0.2,
        ease: 'power2.out'
      });
    });

    hoverTriggers.forEach(trigger => {
      trigger.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
      trigger.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
    });

    // Entry Animation
    window.onload = () => {
      document.getElementById('webgl-container').style.opacity = 1;

      const tl = gsap.timeline();

      tl.to('.animate-slide-up', {
        y: 0,
        opacity: 1,
        duration: 1.5,
        stagger: 0.1,
        ease: 'power3.out'
      })
        .to('.animate-fade-in', {
          y: 0,
          opacity: 1,
          duration: 1.2,
          stagger: 0.1,
          ease: 'power2.out'
        }, "-=1.0");
    };

    // Smooth Scroll (Lenis) - for inertial feel
    const lenis = new Lenis({
      duration: 1.5,
      easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
      smooth: true,
    });
    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);


    // --- 2. THREE.JS "ANTIGRAVITY" STYLE PARTICLES ---

    const initThreeJS = () => {
      const container = document.getElementById('webgl-container');

      const scene = new THREE.Scene();
      // Antigravity has no fog or very subtle fog
      scene.fog = new THREE.FogExp2(0x000000, 0.002);

      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;
      camera.position.y = 0;

      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      // --- PARTICLE SYSTEM ---
      // We will create multiple rings/orbits of particles instead of a sphere

      const particlesGroup = new THREE.Group();
      scene.add(particlesGroup);

      const createParticleRing = (count, radius, tiltX, tiltZ, color, size, spread) => {
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const randoms = new Float32Array(count); // For twinkling/movement

        for (let i = 0; i < count; i++) {
          const angle = (i / count) * Math.PI * 2;

          // Basic Ring Position
          let x = Math.cos(angle) * radius;
          let z = Math.sin(angle) * radius;
          let y = (Math.random() - 0.5) * spread; // Slight vertical spread

          // Add some randomness to radius for "dust" effect
          const rOffset = (Math.random() - 0.5) * 0.5;
          x += Math.cos(angle) * rOffset;
          z += Math.sin(angle) * rOffset;

          // Apply Tilt manually (simplified rotation matrix)
          // Rotate around X
          const y1 = y * Math.cos(tiltX) - z * Math.sin(tiltX);
          const z1 = y * Math.sin(tiltX) + z * Math.cos(tiltX);
          y = y1; z = z1;

          // Rotate around Z
          const x2 = x * Math.cos(tiltZ) - y * Math.sin(tiltZ);
          const y2 = x * Math.sin(tiltZ) + y * Math.cos(tiltZ);
          x = x2; y = y2;

          positions[i * 3] = x;
          positions[i * 3 + 1] = y;
          positions[i * 3 + 2] = z;

          randoms[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));

        const material = new THREE.PointsMaterial({
          size: size,
          color: color,
          transparent: true,
          opacity: 0.6, // Subtle opacity
          blending: THREE.AdditiveBlending,
          sizeAttenuation: true
        });

        const points = new THREE.Points(geometry, material);
        particlesGroup.add(points);
        return points;
      };

      // Create several rings to form a gyroscope/atom structure
      // Main horizontal ring (White)
      const ring1 = createParticleRing(600, 3.5, 0.2, 0, 0xffffff, 0.015, 0.5);

      // Tilted ring 1 (Gold acc)
      const ring2 = createParticleRing(400, 3.2, 1.0, 0.5, 0xd5b263, 0.02, 0.3);

      // Tilted ring 2 (Neon acc)
      const ring3 = createParticleRing(400, 3.2, -1.0, -0.5, 0xccff00, 0.02, 0.3);

      // Ambient Dust (Scattered particles)
      const dustGeometry = new THREE.BufferGeometry();
      const dustCount = 1000;
      const dustPos = new Float32Array(dustCount * 3);
      for (let i = 0; i < dustCount; i++) {
        dustPos[i * 3] = (Math.random() - 0.5) * 15;
        dustPos[i * 3 + 1] = (Math.random() - 0.5) * 15;
        dustPos[i * 3 + 2] = (Math.random() - 0.5) * 10;
      }
      dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
      const dustMaterial = new THREE.PointsMaterial({
        size: 0.01,
        color: 0x444444,
        transparent: true,
        opacity: 0.3,
        blending: THREE.AdditiveBlending
      });
      const dustMesh = new THREE.Points(dustGeometry, dustMaterial);
      scene.add(dustMesh);


      // --- INTERACTION & ANIMATION ---
      let mouseX = 0;
      let mouseY = 0;

      // Smoothing variables
      let targetRotX = 0;
      let targetRotY = 0;

      const windowHalfX = window.innerWidth / 2;
      const windowHalfY = window.innerHeight / 2;

      document.addEventListener('mousemove', (event) => {
        mouseX = (event.clientX - windowHalfX) * 0.0005;
        mouseY = (event.clientY - windowHalfY) * 0.0005;
      });

      const clock = new THREE.Clock();

      const animate = () => {
        const time = clock.getElapsedTime();

        // 1. Rotate Rings independently
        ring1.rotation.y = time * 0.05;
        ring2.rotation.y = time * 0.03; // Different speed
        ring2.rotation.x = Math.sin(time * 0.2) * 0.1; // Gentle wobble
        ring3.rotation.y = -time * 0.04;

        // 2. Rotate entire group based on mouse (Inertia)
        targetRotX = mouseY * 2;
        targetRotY = mouseX * 2;

        particlesGroup.rotation.x += 0.05 * (targetRotX - particlesGroup.rotation.x);
        particlesGroup.rotation.y += 0.05 * (targetRotY - particlesGroup.rotation.y);

        // 3. Gentle float of the whole system
        particlesGroup.position.y = Math.sin(time * 0.5) * 0.1;

        // 4. Ambient dust rotation (very slow)
        dustMesh.rotation.y = time * 0.01;

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      };

      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    };

    initThreeJS();

  </script>
</body>

</html>
